services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: strategy_stock_backend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: postgresql+asyncpg://stock:stock123456@127.0.0.1:5432/app
      DATABASE_URL_SYNC: postgresql+psycopg2://stock:stock123456@127.0.0.1:5432/app
      REDIS_URL: redis://:redis123456@127.0.0.1:6379/0
      XTICK_BASE_URL: http://api.xtick.top
      XTICK_TOKEN: 0d8aa771dd0a0e33624e1546d13c3eb6
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10