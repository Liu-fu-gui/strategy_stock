version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: strategy_stock_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: stock
      POSTGRES_PASSWORD: stock123456
    ports:
      - "5432:5432"
    volumes:
      - ./postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock -d app"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: strategy_stock_redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - redis123456
    ports:
      - "6380:6379"
    volumes:
      - ./redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123456", "PING"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: strategy_stock_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://stock:stock123456@postgres:5432/app
      DATABASE_URL_SYNC: postgresql+psycopg2://stock:stock123456@postgres:5432/app
      REDIS_URL: redis://:redis123456@redis:6379/0
      XTICK_BASE_URL: http://api.xtick.top
      XTICK_TOKEN: 0d8aa771dd0a0e33624e1546d13c3eb6
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: strategy_stock_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
